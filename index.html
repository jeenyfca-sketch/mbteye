<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>눈으로 보는 MBTI</title>
  <style>
    :root {
      --bg: #0d1b2a;
      --panel: rgba(27, 38, 59, 0.92);
      --panel-strong: #1b263b;
      --ink: #ffffff;
      --muted: #e0e1dd;
      --soft: rgba(224, 225, 221, 0.08);
      --line: #415a77;
      --guide: rgba(65, 90, 119, 0.34);
      --accent: #00a8ff;
      --accent-2: #5dade2;
      --gold: #f0c247;
      --blue: #7cc7ff;
      --red: #ff8fa3;
      --green: #8fd8d0;
      --green-dark: #e0e1dd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background:
        radial-gradient(circle at 18% 16%, rgba(0, 168, 255, 0.22), transparent 34%),
        radial-gradient(circle at 82% 72%, rgba(65, 90, 119, 0.42), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    .app-shell {
      background: var(--panel);
      border-radius: 12px;
      border: 1px solid rgba(224, 225, 221, 0.12);
      box-shadow: 0 22px 64px rgba(0, 0, 0, 0.36);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .header {
      padding: 28px 24px 22px;
      text-align: center;
      border-bottom: 1px solid rgba(65, 90, 119, 0.74);
    }

    h1 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: clamp(25px, 6vw, 38px);
      letter-spacing: 0;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.55;
    }

    .guide {
      margin: 0;
      padding: 16px;
      border: 1px solid rgba(124, 199, 255, 0.24);
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      background: var(--guide);
      color: var(--muted);
      text-align: left;
      font-size: 15px;
      line-height: 1.65;
    }

    .progress {
      color: var(--accent-2);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .step,
    .result {
      display: none;
      padding: 26px 22px 28px;
    }

    .step.active,
    .result.active {
      display: block;
    }

    .step h2,
    .result h2 {
      margin: 0 0 22px;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.38;
      text-align: center;
      letter-spacing: 0;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .choice {
      display: flex;
      flex-direction: column;
      min-height: 350px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 10px;
      background: rgba(13, 27, 42, 0.58);
      text-align: center;
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      font: inherit;
      color: inherit;
    }

    .choice:hover,
    .choice:focus-visible {
      border-color: var(--accent);
      background: rgba(0, 168, 255, 0.14);
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 168, 255, 0.2), 0 0 0 1px rgba(124, 199, 255, 0.16) inset;
      outline: none;
    }

    .eye-graphic {
      width: 100%;
      aspect-ratio: 4 / 3;
      display: block;
      border-radius: 7px;
      margin-bottom: 15px;
      background: #0d1b2a;
      border: 1px solid rgba(124, 199, 255, 0.18);
    }

    .eye-graphic .iris-base {
      fill: #7cc7ff;
    }

    .eye-graphic .iris-shade {
      fill: #1b4f72;
      opacity: 0.9;
    }

    .eye-graphic .fiber {
      stroke: rgba(224, 225, 221, 0.66);
      stroke-width: 2;
      stroke-linecap: round;
    }

    .eye-graphic .pupil {
      fill: #02060a;
    }

    .eye-graphic .highlight {
      fill: #ffffff;
      opacity: 0.9;
    }

    .eye-graphic .thick-ring {
      fill: none;
      stroke: #d7fbe8;
      stroke-width: 8;
    }

    .eye-graphic .thin-ring {
      fill: none;
      stroke: rgba(224, 225, 221, 0.5);
      stroke-width: 0.65;
    }

    .eye-graphic .wrinkle {
      fill: none;
      stroke: rgba(224, 225, 221, 0.62);
      stroke-width: 4;
    }

    .eye-graphic .wrinkle-shadow {
      fill: none;
      stroke: rgba(0, 0, 0, 0.34);
      stroke-width: 7;
    }

    .choice-title {
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.4;
    }

    .choice-title.red {
      color: var(--red);
    }

    .choice-title.blue {
      color: var(--blue);
    }

    .choice-title.green {
      color: var(--green);
    }

    .choice p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }

    .result {
      text-align: center;
    }

    .mbti-result {
      margin: 16px auto;
      color: var(--blue);
      font-size: clamp(48px, 16vw, 82px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .result p {
      margin: 0 auto;
      max-width: 520px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .reset-button {
      margin-top: 28px;
      padding: 13px 26px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #1b263b;
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
    }

    .reset-button:hover,
    .reset-button:focus-visible {
      background: var(--accent);
      outline: none;
    }

    @media (max-width: 680px) {
      main {
        padding: 16px 12px 34px;
      }

      .header,
      .step,
      .result {
        padding-left: 16px;
        padding-right: 16px;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="app-shell" id="eyebti-container">
      <header class="header" id="eye-header">
        <h1>👀 눈으로 보는 MBTI</h1>
        <p class="subtitle">재미있게 비교해 보세요</p>
        <p class="guide">
          <strong>필수 가이드</strong><br>
          눈 확인하는 법: 거울을 정면으로 보고 핸드폰 플래시를 눈 측면에서 비춘 상태에서 눈동자를 확인해 주세요.
        </p>
      </header>

      <section class="step active" id="eye-step1" data-step="1">
        <div class="progress">1 / 4</div>
        <h2>1. 내 눈동자의 동공 크기는 어떤가요?</h2>
        <div class="choices">
          <button class="choice" type="button" onclick="goNext(1, 'E')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="동공이 크게 열린 홍채 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <g>
                <line class="fiber" x1="240" y1="89" x2="240" y2="111"/>
                <line class="fiber" x1="304" y1="116" x2="289" y2="132"/>
                <line class="fiber" x1="331" y1="180" x2="309" y2="180"/>
                <line class="fiber" x1="304" y1="244" x2="289" y2="228"/>
                <line class="fiber" x1="240" y1="271" x2="240" y2="249"/>
                <line class="fiber" x1="176" y1="244" x2="191" y2="228"/>
                <line class="fiber" x1="149" y1="180" x2="171" y2="180"/>
                <line class="fiber" x1="176" y1="116" x2="191" y2="132"/>
              </g>
              <circle class="pupil" cx="240" cy="180" r="63"/>
              <circle class="highlight" cx="218" cy="153" r="12"/>
            </svg>
            <span class="choice-title red">E형 선택: 동공이 크다</span>
            <p>눈동자의 동공(검은자)이 시원하게 열려 있고 큰 편이다.</p>
          </button>
          <button class="choice" type="button" onclick="goNext(1, 'I')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="동공이 작게 수축된 홍채 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <g>
                <line class="fiber" x1="240" y1="90" x2="240" y2="132"/>
                <line class="fiber" x1="318" y1="135" x2="282" y2="158"/>
                <line class="fiber" x1="318" y1="225" x2="282" y2="202"/>
                <line class="fiber" x1="240" y1="270" x2="240" y2="228"/>
                <line class="fiber" x1="162" y1="225" x2="198" y2="202"/>
                <line class="fiber" x1="162" y1="135" x2="198" y2="158"/>
              </g>
              <circle class="pupil" cx="240" cy="180" r="26"/>
              <circle class="highlight" cx="227" cy="166" r="8"/>
            </svg>
            <span class="choice-title blue">I형 선택: 동공이 작다</span>
            <p>눈동자의 동공(검은자)이 수축되어 있고 작은 편이다.</p>
          </button>
        </div>
      </section>

      <section class="step" id="eye-step2" data-step="2">
        <div class="progress">2 / 4</div>
        <h2>2. 동공 주변 자율신경선의 굵기는 어떤가요?</h2>
        <div class="choices">
          <button class="choice" type="button" onclick="goNext(2, 'S')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="두껍고 선명한 자율신경선 링 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="thick-ring" cx="240" cy="180" r="55"/>
              <circle class="pupil" cx="240" cy="180" r="34"/>
              <circle class="highlight" cx="222" cy="160" r="10"/>
            </svg>
            <span class="choice-title green">S형 선택: 밧줄처럼 두꺼운 링 선</span>
            <p>동공 주변을 감싸는 원형 테두리 선(자율신경선)이 굵고 선명하다.</p>
          </button>
          <button class="choice" type="button" onclick="goNext(2, 'N')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="거의 보이지 않는 얇은 자율신경선 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="thin-ring" cx="240" cy="180" r="55"/>
              <circle class="pupil" cx="240" cy="180" r="34"/>
              <circle class="highlight" cx="222" cy="160" r="10"/>
            </svg>
            <span class="choice-title blue">N형 선택: 실낱처럼 가느다란 실선</span>
            <p>동공 주변을 감싸는 원형 테두리 선(자율신경선)이 아주 가늘거나 거의 안 보인다.</p>
          </button>
        </div>
      </section>

      <section class="step" id="eye-step3" data-step="3">
        <div class="progress">3 / 4</div>
        <h2>3. 동공 바깥쪽 경계선은 어떤 모양인가요?</h2>
        <div class="choices">
          <button class="choice" type="button" onclick="goNext(3, 'T')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="매끄러운 정원 동공 테두리 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="pupil" cx="240" cy="180" r="46"/>
              <circle cx="240" cy="180" r="47" fill="none" stroke="#ffffff" stroke-width="4"/>
              <circle class="highlight" cx="222" cy="160" r="10"/>
            </svg>
            <span class="choice-title blue">T형 선택: 매끄러운 원형 테두리</span>
            <p>동공의 바깥쪽 경계선이 매끄럽고 깨끗한 원을 그린다.</p>
          </button>
          <button class="choice" type="button" onclick="goNext(3, 'F')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="포도송이처럼 몽글몽글한 동공 테두리 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="pupil" cx="240" cy="180" r="44"/>
              <circle class="pupil" cx="203" cy="156" r="18"/>
              <circle class="pupil" cx="282" cy="153" r="17"/>
              <circle class="pupil" cx="286" cy="205" r="15"/>
              <circle class="pupil" cx="211" cy="216" r="14"/>
              <circle class="highlight" cx="220" cy="158" r="10"/>
            </svg>
            <span class="choice-title red">F형 선택: 몽글몽글한 포도송이형 테두리</span>
            <p>동공의 바깥쪽 경계선 중 어느 한 곳이라도 포도송이처럼 몽글몽글하게 부푼 모양이 있다.</p>
          </button>
        </div>
      </section>

      <section class="step" id="eye-step4" data-step="4">
        <div class="progress">4 / 4</div>
        <h2>4. 눈동자 바탕에 과녁 모양 나이테 주름이 보이나요?</h2>
        <div class="choices">
          <button class="choice" type="button" onclick="goNext(4, 'J')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="동심원 나이테 주름이 있는 홍채 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="wrinkle-shadow" cx="240" cy="180" r="78"/>
              <circle class="wrinkle" cx="240" cy="180" r="78"/>
              <circle class="wrinkle-shadow" cx="240" cy="180" r="68"/>
              <circle class="wrinkle" cx="240" cy="180" r="68"/>
              <circle class="wrinkle-shadow" cx="240" cy="180" r="58"/>
              <circle class="wrinkle" cx="240" cy="180" r="58"/>
              <circle class="pupil" cx="240" cy="180" r="34"/>
              <circle class="highlight" cx="222" cy="160" r="10"/>
            </svg>
            <span class="choice-title red">J형 선택: 나이테 주름이 있음</span>
            <p>눈동자 바탕에 과녁 모양처럼 둥글게 패인 주름선이 1개 이상 보인다.</p>
          </button>
          <button class="choice" type="button" onclick="goNext(4, 'P')">
            <svg class="eye-graphic" viewBox="0 0 480 360" role="img" aria-label="나이테 주름 없이 매끄러운 홍채 일러스트">
              <rect width="480" height="360" rx="18" fill="#0d1b2a"/>
              <ellipse cx="240" cy="180" rx="178" ry="98" fill="#e0e1dd"/>
              <circle class="iris-shade" cx="240" cy="180" r="105"/>
              <circle class="iris-base" cx="240" cy="180" r="91"/>
              <circle class="pupil" cx="240" cy="180" r="34"/>
              <circle class="highlight" cx="222" cy="160" r="10"/>
            </svg>
            <span class="choice-title blue">P형 선택: 나이테 주름이 없음</span>
            <p>눈동자 바탕에 둥글게 패인 주름선이 없거나 거의 보이지 않고 매끈하다.</p>
          </button>
        </div>
      </section>

      <section class="result" id="eye-result-screen" aria-live="polite">
        <h2>나의 눈 분석 결과</h2>
        <div class="mbti-result" id="eye-mbti-text">----</div>
        <p>재미있게 비교해 보셨나요? 친구들과 결과를 공유해 보세요.</p>
        <button class="reset-button" type="button" onclick="resetEyeTest()">다시 확인하기</button>
      </section>
    </div>
  </main>

  <script>
    (function () {
      var result = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

      function showStep(step) {
        document.querySelectorAll(".step").forEach(function (section) {
          section.classList.remove("active");
        });
        document.getElementById("eye-step" + step).classList.add("active");
      }

      window.goNext = function (step, value) {
        result[value] = 1;

        if (step < 4) {
          showStep(step + 1);
          return;
        }

        showFinal();
      };

      function showFinal() {
        document.getElementById("eye-header").style.display = "none";
        document.querySelectorAll(".step").forEach(function (section) {
          section.classList.remove("active");
        });

        var finalMbti =
          (result.E ? "E" : "I") +
          (result.S ? "S" : "N") +
          (result.T ? "T" : "F") +
          (result.J ? "J" : "P");

        document.getElementById("eye-mbti-text").innerText = finalMbti;
        document.getElementById("eye-result-screen").classList.add("active");
      }

      window.resetEyeTest = function () {
        result = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        document.getElementById("eye-header").style.display = "block";
        document.getElementById("eye-result-screen").classList.remove("active");
        showStep(1);
      };
    })();
  </script>
</body>
</html>
